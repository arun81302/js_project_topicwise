<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">


        <div class="navbar">
            <p>Character Counter</p>
        </div>

        <h1>Analyze your text in real-time</h1>

        <textarea name="" id="" placeholder="Start typing here.... (or paste your text)"></textarea>

        <div class="counterbar">
            <div class="box one">
                <h5>00</h5>
                <span>Total Character</span>

            </div>
            <div class="box two">
                <h5>00</h5>
                <span>Word Count</span>
            </div>
            <div class="box three">
                <h5>00</h5>
                <span>Sentence Count
                </span>
                
            </div>


        </div>
            
    </div>  
</body>
</html>
